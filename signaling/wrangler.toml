name = "dokuel-signaling"
main = "src/index.ts"
compatibility_date = "2025-04-01"

routes = [
  { pattern = "signal.dokuel.com", custom_domain = true }
]

[durable_objects]
bindings = [
  { name = "SIGNALING_ROOM", class_name = "SignalingRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["SignalingRoom"]
